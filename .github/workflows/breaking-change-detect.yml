name: Breaking Change Detection

on:
  pull_request:
    branches: [main]
    paths:
      - 'release-notes/**'
      - '**/*api*.md'
      - '**/*breaking*.md'
      - '**/*migration*.md'
  workflow_dispatch:

jobs:
  breaking-change-detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed for full git history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt || true

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate diff of changed files
        run: |
          git diff origin/main...HEAD -- \
            'release-notes/**' \
            '**/*api*.md' \
            '**/*breaking*.md' \
            '**/*migration*.md' \
            > breaking_change_diff.patch

      - name: Run breaking change detector
        id: breaking_detect
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions \
                 --print \
                 "Read breaking_change_diff.patch and run tasks/breaking-change-detector.md on it" \
                 | tee breaking_output.txt

      - name: Post results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('breaking_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Breaking Change Analysis\n\n${output}`
            });